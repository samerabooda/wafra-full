name: 🚀 Auto Deploy — Wafra Gulf

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to system-wafragulf.online
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      - name: 📋 Deployment Info
        run: |
          echo "========================================"
          echo "  Commit : ${{ github.sha }}"
          echo "  Message: ${{ github.event.head_commit.message }}"
          echo "  Time   : $(date -u)"
          echo "========================================"

      - name: 🔧 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 173.231.231.39
          username: systemwafragulf
          password: ${{ secrets.SSH_PASS }}
          port: 22
          timeout: 300s
          script: |
            set -e
            echo "=== Starting Deploy ==="
            cd /home/systemwafragulf/public_html

            # Pull latest code
            git pull origin main

            # Install dependencies
            php /opt/cpanel/ea-wappspector/composer.phar install \
              --no-dev --optimize-autoloader --no-interaction 2>&1

            # Fix permissions
            find . -type d -exec chmod 755 {} \;
            find . -type f -exec chmod 644 {} \;
            chmod -R 775 storage bootstrap/cache

            # Laravel tasks
            php artisan key:generate --force --no-interaction
            php artisan migrate --force --no-interaction
            php artisan storage:link --force
            php artisan optimize:clear
            php artisan optimize

            echo "✅ Deploy complete at $(date)"

      - name: 🏥 Health Check
        run: |
          sleep 8
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 20 https://system-wafragulf.online)
          echo "HTTP Status: $CODE"
          if [ "$CODE" = "200" ] || [ "$CODE" = "302" ]; then
            echo "✅ Site is UP"
          else
            echo "⚠️ Site returned $CODE"
          fi
