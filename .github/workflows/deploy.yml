name: 🚀 Auto Deploy — Wafra Gulf

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to system-wafragulf.online
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      - name: 📋 Info
        run: |
          echo "Commit : ${{ github.sha }}"
          echo "Message: ${{ github.event.head_commit.message }}"
          echo "Time   : $(date -u)"

      # ── Try port 2222 with SSH Key ──────────────────────────
      - name: 🔧 Deploy via SSH Key (port 2222)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 173.231.231.39
          username: systemwafragulf
          key: ${{ secrets.SSH_KEY }}
          port: 2222
          timeout: 300s
          script: |
            set -e
            cd /home/systemwafragulf/public_html
            echo "=== Git Pull ==="
            git pull origin main
            echo "=== Composer ==="
            php /opt/cpanel/ea-wappspector/composer.phar install \
              --no-dev --optimize-autoloader --no-interaction 2>&1
            echo "=== Permissions ==="
            find . -type d -exec chmod 755 {} \;
            find . -type f -exec chmod 644 {} \;
            chmod -R 775 storage bootstrap/cache
            echo "=== Laravel ==="
            php artisan key:generate --force --no-interaction
            php artisan migrate --force --no-interaction
            php artisan storage:link --force
            php artisan optimize:clear
            php artisan optimize
            echo "✅ Done at $(date)"

      - name: 🏥 Health Check
        run: |
          sleep 10
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 20 --location https://system-wafragulf.online)
          echo "HTTP: $CODE"
          [ "$CODE" = "200" ] || [ "$CODE" = "302" ] && echo "✅ UP" || echo "⚠️ $CODE"
