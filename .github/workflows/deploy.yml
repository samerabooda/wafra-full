name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger cPanel Git Pull
    runs-on: ubuntu-latest

    steps:
      - name: Trigger cPanel Deployment
        run: |
          curl -s --fail \
            "https://system-marketequity.com:2083/execute/VersionControl/update" \
            -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_TOKEN }}" \
            -d "type=git&repository_root=%2Fhome%2Fssdawqcq%2Fwafra-full" \
            && echo "Deployment triggered successfully" \
            || echo "Deployment trigger failed"
