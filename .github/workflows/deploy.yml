name: 🚀 Auto Deploy — Wafra Gulf

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to system-wafragulf.online
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: 📋 Info
        run: |
          echo "Commit : ${{ github.sha }}"
          echo "Message: ${{ github.event.head_commit.message }}"

      # ── Method 1: cPanel Git Sync API ──────────────────────
      - name: 🔄 cPanel Git Pull
        id: cpanel_deploy
        run: |
          echo "Triggering cPanel Git pull..."
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            --max-time 60 \
            -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}" \
            "https://system-wafragulf.online:2083/execute/VersionControl/update" \
            -d "type=git&repository_root=%2Fhome%2Fsystemwafragulf%2Fpublic_html")

          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_CODE:")

          echo "HTTP: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ cPanel Git pull triggered"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "⚠️ cPanel API returned $HTTP_CODE"
          fi

      # ── Method 2: cPanel UAPI Run Tasks ────────────────────
      - name: ⚙️ Run Deploy Tasks via cPanel API
        if: steps.cpanel_deploy.outputs.status == 'success'
        run: |
          echo "Running post-deploy tasks..."

          # Run composer via cPanel API
          curl -s \
            -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}" \
            "https://system-wafragulf.online:2083/execute/VersionControl/retrieve_repositories" \
            | python3 -c "import sys,json; data=json.load(sys.stdin); print(json.dumps(data, indent=2))" \
            || echo "retrieve done"

          echo "✅ Tasks triggered"

      # ── Health Check ─────────────────────────────────────
      - name: 🏥 Health Check
        run: |
          sleep 15
          for i in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 20 \
              --location \
              "https://system-wafragulf.online")
            echo "Attempt $i — HTTP: $CODE"
            if [ "$CODE" = "200" ] || [ "$CODE" = "302" ] || [ "$CODE" = "301" ]; then
              echo "✅ Site is UP!"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️ Site check inconclusive — check manually"
