name: Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
    
    - name: 📚 Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader --no-interaction
    
    - name: 🚀 Trigger cPanel Git Pull
      run: |
        echo "🔄 Triggering deployment..."
        
        RESPONSE=$(curl -k -s -w "\n%{http_code}" -X POST \
          "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControl/pull" \
          -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_TOKEN }}" \
          -d "repository_root=${{ secrets.REPOSITORY_ROOT }}")
        
        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
        
        if [ "$HTTP_CODE" -eq 200 ]; then
          echo "✅ Deployment successful!"
        else
          echo "❌ Deployment failed with status $HTTP_CODE"
          exit 1
        fi
    
    - name: 🎉 Success
      run: echo "✅ Deployment completed at $(date)"
