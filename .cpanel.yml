---
deployment:
  tasks:
    # Find and run composer
    - export COMPOSER_HOME=/home/systemwafragulf/.composer
    - export PATH=$PATH:/usr/local/bin:/usr/bin:/bin:/opt/cpanel/ea-php82/root/usr/bin

    # Install composer if missing
    - test -f /usr/local/bin/composer || (curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer 2>&1)

    # Run composer (try all possible paths)
    - /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction 2>&1 || php /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction 2>&1 || curl -sS https://getcomposer.org/installer | php && php composer.phar install --no-dev --optimize-autoloader --no-interaction 2>&1

    # Fix permissions
    - find /home/systemwafragulf/public_html -type d -exec chmod 755 {} \;
    - find /home/systemwafragulf/public_html -type f -exec chmod 644 {} \;
    - chmod -R 775 /home/systemwafragulf/public_html/storage
    - chmod -R 775 /home/systemwafragulf/public_html/bootstrap/cache

    # Laravel
    - php artisan key:generate --force --no-interaction 2>&1
    - php artisan migrate --force --no-interaction 2>&1
    - php artisan storage:link --force 2>&1
    - php artisan optimize:clear 2>&1
    - php artisan optimize 2>&1
    - echo "✅ Done $(date)"
