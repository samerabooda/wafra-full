---
deployment:
  tasks:
    # Install dependencies
    - export COMPOSER_HOME=/home/systemwafragulf/.composer
    - /usr/local/bin/php /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction 2>&1

    # CRITICAL: Fix ALL permissions first (prevents 403)
    - find /home/systemwafragulf/public_html -type d -exec chmod 755 {} \;
    - find /home/systemwafragulf/public_html -type f -exec chmod 644 {} \;
    - chmod 644 /home/systemwafragulf/public_html/.htaccess
    - chmod 644 /home/systemwafragulf/public_html/index.php
    - chmod -R 775 /home/systemwafragulf/public_html/storage
    - chmod -R 775 /home/systemwafragulf/public_html/bootstrap/cache

    # Laravel
    - /usr/local/bin/php artisan key:generate --force --no-interaction 2>&1
    - /usr/local/bin/php artisan migrate --force --no-interaction 2>&1
    - /usr/local/bin/php artisan storage:link --force 2>&1
    - /usr/local/bin/php artisan optimize:clear 2>&1
    - /usr/local/bin/php artisan optimize 2>&1

    - echo "✅ Done $(date)"
